services:
  influxdb:
    image: influxdb:2.7
    container_name: netmon-influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET}
      - DOCKER_INFLUXDB_INIT_RETENTION=${INFLUX_RETENTION}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_ADMIN_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped
    # We let Docker run influxdb as its default user to ensure proper volume permissions

  grafana:
    image: grafana/grafana:latest
    container_name: netmon-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/netmon.json
      - INFLUX_TOKEN=${INFLUX_ADMIN_TOKEN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    restart: unless-stopped

  netmon:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: netmon-service
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_ADMIN_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
    volumes:
      - ./src/config.yaml:/app/config.yaml:ro
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    # Drop all capabilities and add only the required one
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    # The container will run as non-root user (configured in Dockerfile)

  nginx:
    build:
      context: ./monitoring/nginx
      dockerfile: Dockerfile
    container_name: netmon-nginx
    ports:
      - "80:80"
      - "443:443"
      - "8086:8086"
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./monitoring/nginx/certs:/etc/nginx/certs
    depends_on:
      grafana:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb-data:
  grafana-data:
