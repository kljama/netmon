version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: netmon-influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUX_USER}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUX_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUX_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUX_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUX_ADMIN_TOKEN}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: unless-stopped
    # We let Docker run influxdb as its default user to ensure proper volume permissions

  grafana:
    image: grafana/grafana:latest
    container_name: netmon-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - INFLUX_TOKEN=${INFLUX_ADMIN_TOKEN}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb
    restart: unless-stopped

  netmon:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: netmon-service
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=${INFLUX_ADMIN_TOKEN}
      - INFLUX_ORG=${INFLUX_ORG}
      - INFLUX_BUCKET=${INFLUX_BUCKET}
    volumes:
      - ./src/config.yaml:/app/config.yaml:ro
    depends_on:
      - influxdb
    restart: unless-stopped
    # Drop all capabilities and add only the required one
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW
    # The container will run as non-root user (configured in Dockerfile)

  nginx:
    image: nginx:alpine
    container_name: netmon-nginx
    ports:
      - "443:443"
      - "8086:8086"
    volumes:
      - ./monitoring/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./monitoring/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - grafana
      - influxdb
    restart: unless-stopped

volumes:
  influxdb-data:
  grafana-data:
